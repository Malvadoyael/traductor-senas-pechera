<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SENSE AI - Iniciar Sesión</title>
    <style>
        :root { --bg-main: #0f0f12; --bg-panel: #1a1a20; --accent: #00e5ff; }
        body { 
            background: var(--bg-main); 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .login-container {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #2a2a35;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 { color: var(--accent); margin-bottom: 10px; font-size: 32px;}
        p { color: #a0a0a0; margin-bottom: 30px; font-size: 14px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 12px; color: #a0a0a0; letter-spacing: 1px; }
        .input-group input { 
            width: 100%; 
            padding: 12px; 
            background: #0f0f12; 
            border: 1px solid #2a2a35; 
            border-radius: 8px; 
            color: white; 
            font-size: 16px;
            box-sizing: border-box;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); }

        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background: var(--accent); 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-login:hover { background: #00b3cc; }
        
        .error-msg { color: #ff5252; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>SENSE AI</h1>
        <p>Bienvenido al Traductor de Señas</p>

        <!-- Si hay error desde Python, lo mostramos aquí -->
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <!-- El formulario envía los datos a tu ruta de Flask -->
        <form action="/login" method="POST">
            <div class="input-group">
                <label>USUARIO</label>
                <input type="text" name="username" required placeholder="Ingresa tu usuario">
            </div>
            <div class="input-group">
                <label>CONTRASEÑA</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Entrar al Dashboard</button>
        </form>
    </div>

</body>
</html>
