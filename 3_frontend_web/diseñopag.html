<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSE - Traductor LSM en Tiempo Real | TUVCH</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-bg: #1a1a20;
            --primary: #4CAF50; 
            --accent: #00bcd4;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --danger: #ff5252;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Header Profesional --- */
        header {
            width: 100%;
            padding: 15px 30px;
            background-color: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            border-bottom: 2px solid var(--primary);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-placeholder {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .project-info h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .project-info span {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* --- Telemetría y Status --- */
        .system-status {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            color: var(--accent);
            font-family: monospace;
            font-size: 1rem;
        }

        /* --- Contenedor Principal --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            width: 95%;
            max-width: 1000px;
            gap: 20px;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        /* --- Área de Video con Overlays --- */
        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 16px;
            aspect-ratio: 16/9;
            overflow: hidden;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6; /* Para simular espera */
        }

        .vision-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }

        .confidence-bar {
            width: 100px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-top: 5px;
        }

        .confidence-fill {
            height: 100%;
            background: var(--accent);
            width: 85%; /* Simulación */
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* --- Panel de Resultados --- */
        .results-panel {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 20px;
        }

        .current-sign-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
        }

        .current-sign-card span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .big-letter {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
            margin: 0;
        }

        .phrase-builder-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .phrase-display {
            flex-grow: 1;
            font-size: 1.5rem;
            color: var(--text);
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            min-height: 60px;
            margin-bottom: 15px;
            border: 1px inset #222;
        }

        /* --- Botones y Controles --- */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: #333; color: #fff; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .toggle-voice {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="logo-placeholder">TUVCH</div>
            <div class="project-info">
                <h1>SENSE AI</h1>
                <span>Traductor en tiempo real v1.0</span>
            </div>
        </div>
        
        <div class="system-status">
            <div class="stat-item">
                <span>LATENCIA</span>
                <span class="stat-value" id="stat-latency">24ms</span>
            </div>
            <div class="stat-item">
                <span>FPS</span>
                <span class="stat-value" id="stat-fps">30</span>
            </div>
            <div class="stat-item">
                <span>ESTADO</span>
                <span class="stat-value" id="status-text" style="color: var(--danger);">OFFLINE</span>
            </div>
        </div>
    </header>

    <div class="main-grid">
        <div class="video-container">
            <div id="video-feed" style="display: flex; justify-content: center; align-items: center; height: 100%; color: #333;">
                [ FEED DE VIDEO ESP32-CAM ]
            </div>
            
            <div class="vision-overlay">
                <span style="font-size: 0.7rem; color: var(--accent);">PRECISIÓN</span>
                <div class="stat-value" id="confidence-pc">98.2%</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidence-bar"></div>
                </div>
            </div>
        </div>

        <div class="results-panel">
            <div class="current-sign-card">
                <span>DETECCIÓN</span>
                <p class="big-letter" id="current-letter">-</p>
            </div>

            <div class="phrase-builder-card">
                <span>CONSTRUCTOR DE FRASES</span>
                <div class="phrase-display" id="phrase-display">Esperando señas...</div>
                
                <div class="controls-row">
                    <div class="btn-group">
                        <button class="btn-primary" onclick="hablarFrase()">🔊 Hablar</button>
                        <button class="btn-secondary" onclick="agregarEspacio()">⎵ Espacio</button>
                        <button class="btn-danger" onclick="borrarTodo()">Limpiar</button>
                    </div>

                    <div class="toggle-voice">
                        <span>VOZ AUTO</span>
                        <input type="checkbox" id="auto-speak">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const currentLetterEl = document.getElementById('current-letter');
        const phraseDisplayEl = document.getElementById('phrase-display');
        const confidenceBar = document.getElementById('confidence-bar');
        const confidenceText = document.getElementById('confidence-pc');
        const autoSpeakToggle = document.getElementById('auto-speak');
        
        let fraseCompleta = "";
        const synth = window.speechSynthesis;

        // Función para actualizar los datos desde el servidor (Simulación)
        function recibirDatosServidor(letra, precision) {
            // Actualizar letra actual
            if (letra !== currentLetterEl.innerText) {
                currentLetterEl.innerText = letra;
                
                // Si la precisión es alta, agregamos a la frase (Lógica de ejemplo)
                if (precision > 0.8) {
                    actualizarFrase(letra);
                }
            }

            // Actualizar visual de precisión
            const pc = (precision * 100).toFixed(1) + "%";
            confidenceText.innerText = pc;
            confidenceBar.style.width = pc;
        }

        function actualizarFrase(nuevaLetra) {
            // Lógica simple: si es una palabra o letra
            if (fraseCompleta === "") fraseDisplayEl.innerText = "";
            
            fraseCompleta += nuevaLetra;
            phraseDisplayEl.innerText = fraseCompleta;

            if (autoSpeakToggle.checked) {
                hablarTexto(nuevaLetra);
            }
        }

        function hablarTexto(t) {
            if (!t) return;
            synth.cancel();
            const msg = new SpeechSynthesisUtterance(t);
            msg.lang = 'es-MX';
            synth.speak(msg);
        }

        function hablarFrase() {
            hablarTexto(fraseCompleta || "No hay texto para reproducir");
        }

        function agregarEspacio() {
            fraseCompleta += " ";
            phraseDisplayEl.innerText = fraseCompleta;
        }

        function borrarTodo() {
            fraseCompleta = "";
            phraseDisplayEl.innerText = "Esperando señas...";
            currentLetterEl.innerText = "-";
        }

        // Simulación de funcionamiento para el Congresooooo
        setTimeout(() => {
            document.getElementById('status-text').innerText = "ONLINE";
            document.getElementById('status-text').style.color = "var(--primary)";
            
            // Simular detección de una palabra
            let demo = ["H", "O", "L", "A"];
            let i = 0;
            const interval = setInterval(() => {
                recibirDatosServidor(demo[i], 0.92 + (Math.random() * 0.05));
                i++;
                if (i >= demo.length) clearInterval(interval);
            }, 2000);
        }, 2000);
    </script>
</body>
</html>
